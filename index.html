<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CoupleGram</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:white;
}

#app{display:none;}

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input,button{
padding:10px;
margin:5px;
width:260px;
border-radius:8px;
border:none;
outline:none;
box-sizing:border-box;
}

input{
background:#222;
color:white;
border:1px solid #333;
}

button{
background:#ff2d75;
color:white;
cursor:pointer;
font-weight:bold;
transition: background 0.2s;
}

button:hover{
background:#e02463;
}

.post,.storyBox{
background:#1a1a1a;
margin:10px;
padding:10px;
border-radius:12px;
border: 1px solid #222;
}

img,video{width:100%;border-radius:10px;}

nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
border-top:1px solid #222;
z-index: 100;
}

nav button{
flex:1;
background:none;
color:#888;
padding:15px;
margin:0;
border-radius:0;
font-size:12px;
}

nav button.active {
color: #ff2d75;
font-weight: bold;
}

.msg{
padding:8px;
margin:5px;
border-radius:10px;
max-width:70%;
word-break: break-word;
font-size: 14px;
}

.me{background:#ff2d75;margin-left:auto;}
.you{background:#333;}

#typing{
font-size:12px;
opacity:0.7;
padding:5px;
color: #ff2d75;
min-height: 18px;
}

/* Toast Notifikasi Custom */
#toastBox {
position: fixed;
top: 20px;
left: 50%;
transform: translateX(-50%);
background: #ff2d75;
color: white;
padding: 10px 20px;
border-radius: 20px;
font-size: 13px;
font-weight: bold;
z-index: 999;
display: none;
box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<!-- NOTIFIKASI TOAST -->
<div id="toastBox"></div>

<!-- LOGIN -->
<div id="login" class="center">
<h2>CoupleGram 💕 v4</h2>
<input id="email" placeholder="email (misal: romi@love.com)">
<input id="password" type="password" placeholder="password">
<button onclick="register()">Register Account</button>
<button onclick="login()">Login</button>
<div style="font-size: 10px; color: #555; margin-top: 15px;">Data akun disimpan aman di cloud & local</div>
</div>

<!-- APP -->
<div id="app">

<!-- Header Status Pasangan Real-time -->
<div style="padding: 12px; background: #111; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;">
  <span style="font-weight: bold; color: #ff2d75; font-size: 15px;">CoupleGram 💕</span>
  <span id="partnerStatusHeader" style="font-size: 11px; color: #aaa;">Mengecek pasangan...</span>
</div>

<div id="stories" style="display:flex; overflow-x:auto; padding:5px;"></div>

<!-- Ditambahkan padding-bottom agar tidak tertutup nav bar bawah -->
<div id="feed" style="padding-bottom: 80px;"></div>

<div id="chat" style="display:none; padding:10px; padding-bottom:80px;">
<div id="chatBox" style="height:55vh; overflow-y:auto; display:flex; flex-direction:column; padding-bottom:10px;"></div>
<div id="typing"></div>
<div style="display:flex; gap:5px;">
<input id="msg" placeholder="chat..." oninput="typing()" style="flex:1; width:auto; margin:0;">
<button onclick="sendMsg()" style="width:70px; margin:0;">Send</button>
</div>
</div>

<!-- Ditambahkan padding-bottom agar tidak tertutup nav bar bawah -->
<div id="upload" style="display:none; padding:15px; padding-bottom:80px;">
<h3>Bagikan Momen Romantis</h3>
<input type="file" id="file" accept="image/*" style="background:transparent; border:none; padding:5px;">
<div style="font-size:11px; color:#666; margin: 2px 5px 10px 5px;">Pilih foto dari galeri Anda (Akan dikompres otomatis)</div>
<input id="caption" placeholder="caption">
<button onclick="uploadPost()">Upload Post</button>
<button onclick="uploadStory()">Upload Story (24h)</button>
</div>

<nav>
<button id="nav-feed" onclick="show('feed')" class="active">Home</button>
<button id="nav-chat" onclick="show('chat')">Chat</button>
<button id="nav-upload" onclick="show('upload')">Upload</button>
<button onclick="logout()" style="color:#ff3b30; flex:0.5;">Logout</button>
</nav>

</div>

<!-- FIREBASE SDK COMPAT -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = typeof __firebase_config !== 'undefined' 
  ? JSON.parse(__firebase_config) 
  : {
      apiKey: "AIzaSyFakeKey_ForCouplegramDemo_12345",
      authDomain: "couplegram-v4.firebaseapp.com",
      projectId: "couplegram-v4",
      storageBucket: "couplegram-v4.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:1234567890abcdef"
    };

const appId = typeof __app_id !== 'undefined' ? __app_id : 'couplegram-default-app';

// Inisialisasi Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user = null;
let isAuthReady = false;

/* Toast Utility */
function showNotification(text) {
  const box = document.getElementById("toastBox");
  box.innerText = text;
  box.style.display = "block";
  setTimeout(() => {
    box.style.display = "none";
  }, 3000);
}

/* AUTHENTICATION INITIALIZATION (Rule 3) */
async function initAuth() {
  auth.onAuthStateChanged(async (firebaseUser) => {
    isAuthReady = true;
    if (!firebaseUser) {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await auth.signInWithCustomToken(__initial_auth_token);
        } else {
          await auth.signInAnonymously();
        }
      } catch (e) {
        console.warn("Gagal inisialisasi auth latar belakang:", e);
      }
    }

    // Cek jika akun tersimpan sebelumnya di localStorage
    const savedUser = localStorage.getItem("couplegram_saved_user");
    if (savedUser) {
      user = savedUser;
      startApp();
    }
  });
}

/* DAFTAR AKUN BARU */
function register(){
  if (!isAuthReady) {
    showNotification("Menyiapkan koneksi aman, tunggu sebentar...");
    return;
  }

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const emailVal = emailInput.value.trim();
  const passVal = passwordInput.value.trim();

  if(!emailVal || !passVal) {
    showNotification("Email dan password harus diisi!");
    return;
  }

  showNotification("Mendaftarkan akun...");
  
  // Simpan kredensial akun ke database Firestore publik agar aman & terpusat
  const cleanKey = emailVal.replace(/[^a-zA-Z0-9]/g, "_");
  const userRef = db.collection("artifacts").doc(appId).collection("public").doc("data").collection("users").doc(cleanKey);

  userRef.get().then(docSnap => {
    if (docSnap.exists()) {
      showNotification("Email ini sudah terdaftar!");
    } else {
      userRef.set({
        email: emailVal,
        password: passVal,
        time: Date.now()
      }).then(() => {
        showNotification("Pendaftaran Berhasil! Silakan klik Login.");
      }).catch(err => {
        showNotification("Error: " + err.message);
      });
    }
  }).catch(err => {
    showNotification("Gagal terhubung ke database: " + err.message);
  });
}

/* MASUK AKUN */
function login(){
  if (!isAuthReady) {
    showNotification("Menyiapkan koneksi aman, tunggu sebentar...");
    return;
  }

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const emailVal = emailInput.value.trim();
  const passVal = passwordInput.value.trim();

  if(!emailVal || !passVal) {
    showNotification("Email dan password harus diisi!");
    return;
  }

  showNotification("Memverifikasi login...");

  const cleanKey = emailVal.replace(/[^a-zA-Z0-9]/g, "_");
  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("users").doc(cleanKey).get()
  .then(docSnap => {
    if (docSnap.exists() && docSnap.data().password === passVal) {
      user = emailVal;
      // Menyimpan info akun ke localStorage agar tidak ter-logout saat refresh halaman
      localStorage.setItem("couplegram_saved_user", emailVal);
      startApp();
      showNotification("Selamat datang kembali 💕");
    } else {
      showNotification("Email atau password salah!");
    }
  }).catch(err => {
    showNotification("Gagal login: " + err.message);
  });
}

/* LOGOUT */
function logout() {
  if (user) {
    setOnline(false);
  }
  localStorage.removeItem("couplegram_saved_user");
  user = null;
  document.getElementById("app").style.display = "none";
  document.getElementById("login").style.display = "flex";
  showNotification("Berhasil keluar.");
}

function startApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  setOnline(true);
  loadPosts();
  loadChat();
  loadStories();
  listenToTyping();
  listenToPartnerStatus(); // Mulai memantau status pasangan
}

/* ONLINE STATUS */
function setOnline(status){
  if (!user) return;
  const cleanKey = user.replace(/[^a-zA-Z0-9]/g, "_");
  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("status").doc(cleanKey).set({
    user: user,
    online: status,
    time: Date.now()
  }).catch(e => console.warn("Gagal memperbarui status kehadiran:", e));
}

/* INDIKATOR STATUS ONLINE PASANGAN */
function listenToPartnerStatus() {
  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("status")
  .onSnapshot(snap => {
    const header = document.getElementById("partnerStatusHeader");
    let partnerOnline = false;
    let partnerEmail = "";
    let lastActive = null;

    snap.forEach(doc => {
      const d = doc.data();
      if (d.user !== user) {
        partnerEmail = d.user;
        if (d.online) {
          partnerOnline = true;
        } else {
          lastActive = d.time;
        }
      }
    });

    if (partnerOnline) {
      header.innerHTML = `<span style="color: #4cd137;">● ${partnerEmail.split('@')[0]} aktif</span>`;
    } else if (partnerEmail) {
      const timeStr = lastActive ? new Date(lastActive).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : "baru-baru ini";
      header.innerHTML = `<span style="color: #888;">○ ${partnerEmail.split('@')[0]} off (${timeStr})</span>`;
    } else {
      header.innerHTML = `<span style="color: #555;">Menanti pasangan...</span>`;
    }
  }, error => {
    console.error("Gagal mendengarkan status online pasangan:", error);
  });
}

/* NAVIGASI SINGLE PAGE */
function show(x){
  document.getElementById("feed").style.display = x == "feed" ? "block" : "none";
  document.getElementById("chat").style.display = x == "chat" ? "block" : "none";
  document.getElementById("upload").style.display = x == "upload" ? "block" : "none";

  // Atur kelas tombol aktif
  document.getElementById("nav-feed").classList.toggle("active", x == "feed");
  document.getElementById("nav-chat").classList.toggle("active", x == "chat");
  document.getElementById("nav-upload").classList.toggle("active", x == "upload");

  if(x == "chat") {
    const chatBox = document.getElementById("chatBox");
    chatBox.scrollTop = chatBox.scrollHeight;
  }
}

/* PEMBANTU KONVERSI FILE KE BASE64 DENGAN KOMPRESI (Mencegah Firestore Overload) */
function getFileBase64(fileEl) {
  return new Promise((resolve) => {
    const f = fileEl.files[0];
    if (!f) {
      // Sediakan gambar romantis default jika tidak mengunggah apa pun
      resolve("https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=600&auto=format&fit=crop&q=60");
      return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        // Buat kanvas untuk kompresi gambar (maksimal lebar/tinggi 800px)
        const canvas = document.createElement("canvas");
        let width = img.width;
        let height = img.height;
        const max_size = 800;
        
        if (width > height) {
          if (width > max_size) {
            height *= max_size / width;
            width = max_size;
          }
        } else {
          if (height > max_size) {
            width *= max_size / height;
            height = max_size;
          }
        }
        
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        
        // Kompres gambar menjadi format JPEG dengan kualitas 70% agar file sangat kecil
        resolve(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(f);
  });
}

/* POSTING BARU */
async function uploadPost(){
  if (!user) return;
  showNotification("Sedang memproses & mengirim kiriman...");
  
  const mediaUrl = await getFileBase64(document.getElementById("file"));
  const captionVal = document.getElementById("caption").value;

  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("posts").add({
    user: user,
    media: mediaUrl,
    caption: captionVal || "Momen spesial kita 💕",
    time: Date.now(),
    likes: 0
  }).then(() => {
    showNotification("Postingan berhasil diunggah!");
    document.getElementById("caption").value = "";
    document.getElementById("file").value = "";
    show("feed");
  }).catch(err => {
    showNotification("Gagal kirim postingan: " + err.message);
  });
}

/* CERITA BARU (24 JAM) */
async function uploadStory(){
  if (!user) return;
  showNotification("Sedang memproses & mengirim cerita...");

  const mediaUrl = await getFileBase64(document.getElementById("file"));

  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("stories").add({
    user: user,
    media: mediaUrl,
    time: Date.now()
  }).then(() => {
    showNotification("Cerita baru dibagikan!");
    document.getElementById("file").value = "";
    show("feed");
  }).catch(err => {
    showNotification("Gagal membagikan cerita: " + err.message);
  });
}

/* MENYUKAI POSTINGAN (LIKE TRANSACTION) */
function likePost(postId) {
  if (!user) return;
  const postRef = db.collection("artifacts").doc(appId).collection("public").doc("data").collection("posts").doc(postId);
  
  // Menggunakan transaksi database agar perhitungan jumlah menyukai akurat secara bersamaan
  db.runTransaction(transaction => {
    return transaction.get(postRef).then(docSnap => {
      if (!docSnap.exists) return;
      const currentLikes = docSnap.data().likes || 0;
      transaction.update(postRef, { likes: currentLikes + 1 });
    });
  }).then(() => {
    showNotification("Disukai! ❤️");
  }).catch(err => {
    console.error("Gagal menyukai postingan:", err);
  });
}

/* MUAT SEMUA POSTINGAN (Rule 2: Urutkan lokal) */
function loadPosts(){
  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("posts")
  .onSnapshot(snap => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    
    let list = [];
    snap.forEach(doc => {
      list.push({ id: doc.id, ...doc.data() });
    });

    // Urutkan secara lokal (terbaru ke terlama)
    list.sort((a, b) => b.time - a.time);

    if (list.length === 0) {
      feed.innerHTML = "<div style='text-align:center; padding:40px; color:#555;'>Belum ada foto yang diposting.</div>";
      return;
    }

    list.forEach(d => {
      feed.innerHTML += `
      <div class="post">
        <b style="color:#ff2d75;">${d.user}</b><br>
        <span style="font-size:9px; color:#555;">${new Date(d.time).toLocaleString('id-ID')}</span>
        <img src="${d.media}" style="margin-top:10px; max-height: 400px; object-fit: cover;" onerror="this.src='https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=500'">
        <p style="margin:8px 0 0 0; font-size:14px; line-height:1.4;">${d.caption}</p>
        <div style="margin-top: 10px; display: flex; align-items: center;">
          <button onclick="likePost('${d.id}')" style="width: auto; padding: 5px 12px; margin: 0; font-size: 11px; border-radius: 6px;">❤️ ${d.likes || 0} Likes</button>
        </div>
      </div>`;
    });
  }, error => {
    console.error("Gagal mendengarkan postingan:", error);
  });
}

/* MUAT CERITA (AUTO 24 JAM FILTER LOKAL) */
function loadStories(){
  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("stories")
  .onSnapshot(snap => {
    const stories = document.getElementById("stories");
    stories.innerHTML = "";
    let now = Date.now();
    let count = 0;

    snap.forEach(doc => {
      let d = doc.data();
      if(now - d.time < 86400000){ // 24 jam saja
        count++;
        stories.innerHTML += `
        <div class="storyBox" style="flex-shrink:0; width:80px; text-align:center; margin:5px; padding:5px;">
          <b style="font-size:10px; display:block; text-overflow:ellipsis; overflow:hidden; white-space:nowrap; margin-bottom:4px;">${d.user.split('@')[0]}</b>
          <img src="${d.media}" style="width:60px; height:60px; object-fit: cover; border-radius:50%; border: 2px solid #ff2d75;" onerror="this.src='https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=100'">
        </div>`;
      }
    });

    if (count === 0) {
      stories.innerHTML = "<div style='color:#444; font-size:11px; padding:10px;'>Belum ada cerita baru hari ini...</div>";
    }
  }, error => {
    console.error("Gagal memuat cerita:", error);
  });
}

/* OBROLAN / CHAT */
function sendMsg(){
  const msgInput = document.getElementById("msg");
  const msgVal = msgInput.value.trim();
  if(!msgVal || !user) return;

  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("chats").add({
    user: user,
    msg: msgVal,
    time: Date.now()
  }).then(() => {
    msgInput.value = "";
    // Matikan indikator mengetik saat mengirim pesan
    const cleanKey = user.replace(/[^a-zA-Z0-9]/g, "_");
    db.collection("artifacts").doc(appId).collection("public").doc("data").collection("typing").doc(cleanKey).set({
      typing: false
    });
  });
}

function loadChat(){
  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("chats")
  .onSnapshot(snap => {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";
    
    let list = [];
    snap.forEach(doc => {
      list.push(doc.data());
    });

    // Urutkan secara lokal berdasarkan waktu (Rule 2)
    list.sort((a, b) => a.time - b.time);

    list.forEach(d => {
      const isMe = d.user === user;
      chatBox.innerHTML += `
      <div class="msg ${isMe ? 'me' : 'you'}">
        <span style="font-size:9px; opacity:0.7; display:block; margin-bottom:2px;">${isMe ? 'Saya' : d.user}</span>
        ${d.msg}
      </div>`;
    });

    // Geser scroll paling bawah otomatis
    chatBox.scrollTop = chatBox.scrollHeight;
  }, error => {
    console.error("Gagal mendengarkan obrolan:", error);
  });
}

/* TYPING INDICATOR */
let typingTimeout;
function typing(){
  if (!user) return;
  const cleanKey = user.replace(/[^a-zA-Z0-9]/g, "_");
  
  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("typing").doc(cleanKey).set({
    typing: true,
    user: user,
    time: Date.now()
  });

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.collection("artifacts").doc(appId).collection("public").doc("data").collection("typing").doc(cleanKey).set({
      typing: false
    });
  }, 1500);
}

/* MENAMPILKAN INDIKATOR SEDANG MENGETIK */
function listenToTyping() {
  db.collection("artifacts").doc(appId).collection("public").doc("data").collection("typing")
  .onSnapshot(snap => {
    const typingDiv = document.getElementById("typing");
    let typers = [];

    snap.forEach(doc => {
      let d = doc.data();
      if(doc.id !== user.replace(/[^a-zA-Z0-9]/g, "_") && d.typing){
        typers.push(d.user);
      }
    });

    if (typers.length > 0) {
      typingDiv.innerText = typers[0] + " sedang mengetik...";
    } else {
      typingDiv.innerText = "";
    }
  });
}

// Inisialisasi awal saat halaman dibuka
window.onload = async () => {
  await initAuth();
};

/* AUTO OFF PASANGAN KETIKA TAB DIKELUARKAN */
window.onbeforeunload = () => {
  if (user) {
    setOnline(false);
  }
};
</script>

</body>
</html>
